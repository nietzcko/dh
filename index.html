<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Neon Downhill Stable</title>
<style>
:root{
  --bg:#05070b;
  --bg2:#0a1424;
  --trail:#161d26;
  --trail2:#0d1218;
  --neon:#39f4ff;
  --pink:#ff4f92;
  --gold:#ffd84b;
  --rock:#2a3440;
  --white:#eef7ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 30%, #10203a 0%, var(--bg) 60%, #020305 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;left:50%;top:16px;transform:translateX(-50%);text-align:center;color:white;pointer-events:none;text-shadow:0 0 14px rgba(0,0,0,.8)}
#hud .t{font-size:12px;opacity:.75;letter-spacing:2px;text-transform:uppercase}
#hud .s{font-size:30px;font-weight:900}
#hud .s span{color:var(--gold)}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);text-align:center;color:rgba(255,255,255,.82);font-size:13px;pointer-events:none;text-shadow:0 0 14px rgba(0,0,0,.9)}
</style>
</head>
<body>
<div id="hud"><div class="t">Neon Downhill</div><div class="s"><span id="speed">0</span> km/h</div></div>
<div id="hint">Tartás: gurul • Előre húzás: fék + orr le • Hátra húzás: manuál • Elengedés: ugrás</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const speedEl = document.getElementById('speed');

function resize(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.floor(innerWidth*dpr);
  canvas.height = Math.floor(innerHeight*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize', resize);
resize();

const W = ()=>innerWidth, H = ()=>innerHeight;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const TAU = Math.PI*2;

let camX = 0, camY = 0;
let terrain = [];
let rocks = [];
let genX = -400;
let seed = 0.41731;
let pointerId = null;
let hold = false;
let dragStart = null;
let dragNow = null;

function rnd(){ seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }
function terrainFunc(x){ return 340 + x*0.21 + Math.sin(x*0.006)*34 + Math.sin(x*0.017)*14 + Math.sin(x*0.041)*5; }

function ensureTerrain(){
  while(genX < camX + W() + 900){
    genX += 44 + rnd()*34;
    const x = genX;
    const y = terrainFunc(x);
    terrain.push({x,y});
    if(rnd() < 0.12){
      rocks.push({x:x+30+rnd()*90,y:y-(10+rnd()*16),r:9+rnd()*11,vx:0,vy:0,spin:0,a:rnd()*TAU});
    }
    if(rnd() < 0.03){
      rocks.push({x:x+40+rnd()*80,y:y-(18+rnd()*14),r:18+rnd()*9,vx:0,vy:0,spin:0,a:rnd()*TAU});
    }
  }
  terrain = terrain.filter(p=>p.x > camX-300);
  rocks = rocks.filter(r=>r.x > camX-320 && r.y < camY + H() + 320);
}
function groundY(x){
  for(let i=0;i<terrain.length-1;i++){
    const a=terrain[i], b=terrain[i+1];
    if(x>=a.x && x<=b.x){
      const t=(x-a.x)/(b.x-a.x);
      return a.y + (b.y-a.y)*t;
    }
  }
  return terrainFunc(x);
}
function groundAngle(x){
  const e = 6;
  return Math.atan2(groundY(x+e)-groundY(x-e), e*2);
}

const bike = {
  x: 110, y: 220,
  vx: 0, vy: 0,
  angle: -0.12, angVel: 0,
  wb: 82,
  rearR: 18, frontR: 18,
  rearTouch:false, frontTouch:false,
  forkTarget:0, shockTarget:0,
  forkVisual:0, shockVisual:0,
  crash:false, respawn:0
};

function resetGame(){
  camX=0; camY=0; terrain=[]; rocks=[]; genX=-400;
  bike.x=110; bike.y=210; bike.vx=0; bike.vy=0; bike.angle=-0.14; bike.angVel=0;
  bike.rearTouch=false; bike.frontTouch=false; bike.forkTarget=0; bike.shockTarget=0; bike.forkVisual=0; bike.shockVisual=0;
  bike.crash=false; bike.respawn=0;
  ensureTerrain();
}
resetGame();

function screenToWorld(x,y){ return {x:x+camX, y:y+camY}; }

function onDown(e){
  e.preventDefault();
  if(bike.crash){ resetGame(); return; }
  pointerId = e.pointerId;
  canvas.setPointerCapture(pointerId);
  hold = true;
  dragStart = {x:e.clientX, y:e.clientY};
  dragNow = {x:e.clientX, y:e.clientY};
}
function onMove(e){
  if(pointerId !== e.pointerId || !hold) return;
  e.preventDefault();
  dragNow = {x:e.clientX, y:e.clientY};
}
function onUp(e){
  if(pointerId !== e.pointerId || !hold) return;
  e.preventDefault();
  const dx = dragNow.x - dragStart.x;
  const dy = dragNow.y - dragStart.y;
  const len = Math.min(Math.hypot(dx,dy), 140);
  const back = clamp(-dx/140, 0, 1);
  const up = clamp(-dy/140, 0, 1);
  bike.vy -= 3.2 + up*4.8 + back*1.5;
  bike.vx += 1.2 + back*1.8;
  bike.angVel += clamp((-dx)*0.002, -0.08, 0.08);
  hold = false;
  pointerId = null;
  dragStart = null;
  dragNow = null;
}
canvas.addEventListener('pointerdown', onDown, {passive:false});
canvas.addEventListener('pointermove', onMove, {passive:false});
canvas.addEventListener('pointerup', onUp, {passive:false});
canvas.addEventListener('pointercancel', onUp, {passive:false});

function update(){
  ensureTerrain();
  if(bike.crash){
    bike.respawn -= 1/60;
    if(bike.respawn <= 0) resetGame();
    return;
  }

  let dragX = 0, dragY = 0;
  if(hold && dragStart && dragNow){
    dragX = dragNow.x - dragStart.x;
    dragY = dragNow.y - dragStart.y;
  }
  const lean = hold ? clamp(dragX/90, -1, 1) : 0;
  const brake = hold ? Math.max(0, lean) : 0.38;
  const drive = hold ? 0.19 : 0;

  bike.vy += 0.34;

  const rearX = bike.x - Math.cos(bike.angle)*bike.wb*0.5;
  const rearY = bike.y - Math.sin(bike.angle)*bike.wb*0.5;
  const frontX = bike.x + Math.cos(bike.angle)*bike.wb*0.5;
  const frontY = bike.y + Math.sin(bike.angle)*bike.wb*0.5;

  const gyR = groundY(rearX), gyF = groundY(frontX);
  const penR = rearY + bike.rearR - gyR;
  const penF = frontY + bike.frontR - gyF;
  bike.rearTouch = penR >= -2;
  bike.frontTouch = penF >= -2;
  const grounded = bike.rearTouch || bike.frontTouch;

  if(grounded){
    const slopeA = bike.rearTouch && bike.frontTouch ? Math.atan2(gyF-gyR, frontX-rearX) : (bike.rearTouch ? groundAngle(rearX) : groundAngle(frontX));
    const speedPitch = clamp(bike.vx*0.006, -0.04, 0.10);
    const manual = Math.max(0, -lean) * 0.17;
    const nose = Math.max(0, lean) * 0.11;
    const brakeDive = brake * 0.16;
    const targetA = slopeA + speedPitch + nose - manual - brakeDive;
    bike.angle = lerp(bike.angle, targetA, bike.rearTouch && bike.frontTouch ? 0.18 : 0.08);

    bike.vx += drive + Math.sin(slopeA)*0.16;
    bike.vx *= 1 - (0.011 + brake*0.05);

    if(bike.rearTouch){
      const target = gyR - bike.rearR;
      bike.y -= (rearY - target)*0.52;
      bike.vy *= 0.18;
    }
    if(bike.frontTouch){
      const target = gyF - bike.frontR;
      bike.y -= (frontY - target)*0.52;
      bike.vy *= 0.18;
    }

    bike.shockTarget = clamp(Math.max(0, penR)*2.0 + Math.abs(bike.vy)*0.6 + Math.max(0,-lean)*4, 0, 18);
    bike.forkTarget = clamp(Math.max(0, penF)*2.0 + Math.abs(bike.vy)*0.8 + brake*18 + Math.max(0,lean)*3, 0, 24);
  } else {
    bike.vx *= 0.997;
    bike.angle += bike.angVel;
    bike.angVel += lean*0.0045;
    bike.angVel *= 0.99;
    bike.shockTarget *= 0.84;
    bike.forkTarget *= 0.82;
  }

  bike.x += bike.vx;
  bike.y += bike.vy;

  for(const rock of rocks){
    rock.vy += 0.28;
    const gy = groundY(rock.x);
    if(rock.y + rock.r >= gy){
      rock.y = gy - rock.r;
      const a = groundAngle(rock.x);
      rock.vy *= -0.08;
      rock.vx += Math.sin(a)*0.18;
      rock.vx *= 0.992;
      rock.spin = rock.vx / Math.max(rock.r,1);
    }
    rock.x += rock.vx;
    rock.y += rock.vy;
    rock.a += rock.spin;

    const pts = [
      {x:bike.x - Math.cos(bike.angle)*bike.wb*0.5, y:bike.y - Math.sin(bike.angle)*bike.wb*0.5, r:bike.rearR, rear:true},
      {x:bike.x + Math.cos(bike.angle)*bike.wb*0.5, y:bike.y + Math.sin(bike.angle)*bike.wb*0.5, r:bike.frontR, rear:false}
    ];
    for(const p of pts){
      const dx = rock.x - p.x, dy = rock.y - p.y;
      const d = Math.hypot(dx,dy) || 1;
      const rr = rock.r + p.r;
      if(d < rr){
        const nx = dx/d, ny = dy/d, push = rr-d;
        rock.x += nx*push*0.7;
        rock.y += ny*push*0.7;
        rock.vx += nx*(p.rear?0.28:0.42) + bike.vx*0.04;
        rock.vy += ny*0.18;
        if(p.rear) bike.shockTarget += push*0.6; else bike.forkTarget += push*0.8;
        bike.vx *= p.rear ? 0.988 : 0.98;
      }
    }
  }

  bike.forkVisual = lerp(bike.forkVisual, bike.forkTarget, 0.22);
  bike.shockVisual = lerp(bike.shockVisual, bike.shockTarget, 0.20);

  const headX = bike.x + Math.cos(bike.angle)*18 - Math.sin(bike.angle)*55;
  const headY = bike.y + Math.sin(bike.angle)*18 + Math.cos(bike.angle)*55;
  if(headY > groundY(headX)-5 && bike.vx > 3.5){
    bike.crash = true;
    bike.respawn = 1.2;
  }

  camX = lerp(camX, bike.x - W()*0.28, 0.08);
  camY = lerp(camY, bike.y - H()*0.47, 0.08);
  speedEl.textContent = Math.max(0, Math.round(bike.vx*6.5));
}

function drawBg(){
  ctx.fillStyle = '#05070b';
  ctx.fillRect(0,0,W(),H());
  const g = ctx.createRadialGradient(W()*0.5,H()*0.38,0,W()*0.5,H()*0.38,W()*0.72);
  g.addColorStop(0,'rgba(57,244,255,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W(),H());
  ctx.strokeStyle = 'rgba(57,244,255,0.03)';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.arc((i*260 - camX*0.13)%(W()+220)-110, H()*0.48, 130+i*28, 0, TAU);
    ctx.stroke();
  }
}

function drawTerrain(){
  ctx.save();
  ctx.translate(-camX,-camY);

  ctx.beginPath();
  if(terrain.length){
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for(let i=1;i<terrain.length;i++) ctx.lineTo(terrain[i].x, terrain[i].y);
    ctx.lineTo(terrain[terrain.length-1].x, camY+H()+300);
    ctx.lineTo(terrain[0].x, camY+H()+300);
    ctx.closePath();
  }
  const grd = ctx.createLinearGradient(0,camY,0,camY+H()+280);
  grd.addColorStop(0,'#19212c');
  grd.addColorStop(1,'#0a0f15');
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.beginPath();
  if(terrain.length){
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for(let i=1;i<terrain.length;i++) ctx.lineTo(terrain[i].x, terrain[i].y);
  }
  ctx.strokeStyle = '#39f4ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#39f4ff';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;

  for(const r of rocks){
    ctx.save();
    ctx.translate(r.x,r.y);
    ctx.rotate(r.a);
    ctx.beginPath();
    for(let i=0;i<7;i++){
      const a = i/7*TAU;
      const rr = r.r*(0.8 + (i%2?0.18:-0.04));
      const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle = '#283340';
    ctx.fill();
    ctx.strokeStyle = 'rgba(57,244,255,0.35)';
    ctx.lineWidth = 1.4;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function drawBike(){
  const fork = bike.forkVisual;
  const shock = bike.shockVisual;
  const rear = {x:-bike.wb*0.5,y:0};
  const front = {x:bike.wb*0.5,y:0};
  const bb = {x:-5,y:-9 + shock*0.15};
  const seat = {x:-28,y:-30 + shock*0.12};
  const headTop = {x:17,y:-43 + fork*0.06};
  const headBot = {x:22,y:-30 + fork*0.09};
  const crown = {x:21,y:-33 + fork*0.10};
  const bar = {x:31,y:-56 + fork*0.06};
  const forkEndL = {x:front.x-4, y:-12 + fork*0.95};
  const forkEndR = {x:front.x+2, y:-12 + fork*0.95};
  const shockTop = {x:-6,y:-31};
  const shockBot = {x:2,y:-10 + shock*0.18};

  ctx.save();
  ctx.translate(bike.x-camX,bike.y-camY);
  ctx.rotate(bike.angle);

  ctx.strokeStyle='rgba(255,255,255,0.10)';
  ctx.lineWidth=7;
  ctx.beginPath();ctx.arc(rear.x,rear.y,bike.rearR,0,TAU);ctx.stroke();
  ctx.beginPath();ctx.arc(front.x,front.y,bike.frontR,0,TAU);ctx.stroke();
  ctx.strokeStyle='#39f4ff';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(rear.x,rear.y,bike.rearR-6,0,TAU);ctx.stroke();
  ctx.beginPath();ctx.arc(front.x,front.y,bike.frontR-6,0,TAU);ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,.82)';
  ctx.lineWidth=2.4;
  ctx.beginPath();
  ctx.moveTo(rear.x,rear.y);
  ctx.lineTo(bb.x,bb.y);
  ctx.lineTo(headBot.x,headBot.y);
  ctx.lineTo(front.x,front.y);
  ctx.moveTo(headTop.x,headTop.y);
  ctx.lineTo(seat.x,seat.y);
  ctx.lineTo(rear.x,rear.y);
  ctx.moveTo(seat.x,seat.y);
  ctx.lineTo(bb.x,bb.y);
  ctx.stroke();

  ctx.strokeStyle='#ff4f92';
  ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(shockTop.x,shockTop.y);ctx.lineTo(shockBot.x,shockBot.y);ctx.stroke();
  ctx.strokeStyle='#39f4ff';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const t = i/5;
    const x = lerp(shockTop.x,shockBot.x,t) + (i%2?3:-3);
    const y = lerp(shockTop.y,shockBot.y,t);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,0.26)';
  ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(crown.x,crown.y);ctx.lineTo(forkEndL.x,forkEndL.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(crown.x+5,crown.y-1);ctx.lineTo(forkEndR.x,forkEndR.y);ctx.stroke();

  ctx.strokeStyle='#39f4ff';
  ctx.shadowColor='#39f4ff';
  ctx.shadowBlur=12;
  ctx.lineWidth=2.1;
  ctx.beginPath();ctx.moveTo(headTop.x,headTop.y);ctx.lineTo(bar.x,bar.y);ctx.lineTo(bar.x+8,bar.y-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(crown.x,crown.y);ctx.lineTo(forkEndL.x,forkEndL.y);ctx.lineTo(front.x-1,front.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(crown.x+5,crown.y-1);ctx.lineTo(forkEndR.x,forkEndR.y);ctx.lineTo(front.x+2,front.y);ctx.stroke();
  ctx.shadowBlur=0;

  const dx = hold && dragStart && dragNow ? clamp((dragNow.x-dragStart.x)/90,-1,1) : 0;
  const hands = {x:bar.x+8,y:bar.y};
  const pedals = {x:bb.x+7,y:bb.y+10};
  let hips = {x:seat.x+8,y:seat.y-8};
  let shoulder = {x:8,y:-52};
  let head = {x:15,y:-62};

  hips.x -= dx*13;
  hips.y += Math.max(0,dx)*5 - Math.max(0,-dx)*2;
  shoulder.x += dx*6;
  shoulder.y += Math.max(0,dx)*5;
  head.x += dx*7;
  head.y += Math.max(0,dx)*5;
  if(!bike.rearTouch && !bike.frontTouch){ hips.y += 5; shoulder.y += 3; head.y += 3; }

  ctx.strokeStyle=bike.crash?'#ff4f92':'#39f4ff';
  ctx.shadowColor=ctx.strokeStyle;
  ctx.shadowBlur=10;
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(hips.x,hips.y);
  ctx.lineTo(shoulder.x,shoulder.y);
  const armMid = {x:(shoulder.x+hands.x)/2 - 2, y:(shoulder.y+hands.y)/2 + 5};
  ctx.moveTo(shoulder.x,shoulder.y);
  ctx.lineTo(armMid.x,armMid.y);
  ctx.lineTo(hands.x,hands.y);
  const legMid = {x:(hips.x+pedals.x)/2 + 7, y:(hips.y+pedals.y)/2 + 8};
  ctx.moveTo(hips.x,hips.y);
  ctx.lineTo(legMid.x,legMid.y);
  ctx.lineTo(pedals.x,pedals.y);
  ctx.stroke();
  ctx.beginPath();ctx.arc(head.x,head.y,8,0,TAU);ctx.fillStyle=ctx.strokeStyle;ctx.fill();
  ctx.shadowBlur=0;

  if(hold && dragStart && dragNow){
    ctx.setLineDash([8,6]);
    ctx.strokeStyle='rgba(57,244,255,.5)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(dragNow.x, dragNow.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawCrash(){
  if(!bike.crash) return;
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='#ff4f92';
  ctx.font='900 46px system-ui';
  ctx.textAlign='center';
  ctx.fillText('SLAM', W()/2, H()/2-8);
  ctx.fillStyle='#fff';
  ctx.font='18px system-ui';
  ctx.fillText('Újratöltés...', W()/2, H()/2+26);
}

function frame(){
  update();
  drawBg();
  drawTerrain();
  drawBike();
  drawCrash();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
