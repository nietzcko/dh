<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Neon Downhill Drift</title>
<style>
:root {
  --bg0: #05070b;
  --bg1: #0b1020;
  --bg2: #07111a;
  --neon: #37f6ff;
  --neon2: #ff4b8b;
  --accent: #ffd84d;
  --trail: #121923;
  --trailEdge: #3cf3ff;
  --rock: #202833;
  --rock2: #2b3542;
  --txt: #eef6ff;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at 50% 35%, #0b1930 0%, var(--bg0) 58%, #020306 100%);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  touch-action: none;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#hud {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  pointer-events: none;
  text-align: center;
  text-shadow: 0 0 12px rgba(0,0,0,.75);
}
#hud .title {
  font-size: 13px;
  opacity: .75;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#hud .speed {
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 1px;
}
#hud .speed span { color: var(--accent); }
#hint {
  position: fixed;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,.8);
  font-size: 13px;
  letter-spacing: .3px;
  text-align: center;
  pointer-events: none;
  text-shadow: 0 0 12px rgba(0,0,0,.8);
}
</style>
</head>
<body>
<div id="hud">
  <div class="title">Neon Downhill</div>
  <div class="speed"><span id="speed">0</span> km/h</div>
</div>
<div id="hint">Tartsd nyomva: gurulás • Előre húzva: fék + orr le • Hátra húzva: manuál • Elengedve: ugrás</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const speedEl = document.getElementById('speed');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

const W = () => innerWidth;
const H = () => innerHeight;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);

let hold = false;
let dragStart = null;
let dragNow = null;
let slingshot = { x: 0, y: 0, len: 0 };

const bike = {
  x: 120,
  y: 260,
  vx: 0,
  vy: 0,
  angle: 0,
  angVel: 0,
  wheelBase: 78,
  rearR: 17,
  frontR: 17,
  groundedRear: false,
  groundedFront: false,
  grounded: false,
  forkComp: 0,
  shockComp: 0,
  forkVel: 0,
  shockVel: 0,
  forkVisual: 0,
  shockVisual: 0,
  headHitRadius: 12,
  crash: false,
  respawnTimer: 0,
};

let camX = 0;
let camY = 0;
let terr = [];
let rocks = [];
let genX = -400;
let genY = 580;
let noiseSeed = 0.327;

function rnd() {
  noiseSeed = (noiseSeed * 16807) % 2147483647;
  return (noiseSeed - 1) / 2147483646;
}

function groundProfile(x) {
  return 340 + x * 0.19 + Math.sin(x * 0.010) * 18 + Math.sin(x * 0.029) * 9 + Math.sin(x * 0.0043) * 35;
}

function ensureTerrain() {
  while (genX < camX + W() + 900) {
    const step = 60 + rnd() * 55;
    genX += step;
    const y = groundProfile(genX);
    terr.push({ x: genX, y });

    if (rnd() < 0.18) {
      rocks.push({
        x: genX + 20 + rnd() * 80,
        y: y - 10 - rnd() * 14,
        r: 9 + rnd() * 12,
        vx: 0,
        vy: 0,
        spin: 0,
        ang: rnd() * Math.PI * 2,
      });
    }
    if (rnd() < 0.06) {
      rocks.push({
        x: genX + 30 + rnd() * 120,
        y: y - 20 - rnd() * 16,
        r: 18 + rnd() * 10,
        vx: 0,
        vy: 0,
        spin: 0,
        ang: rnd() * Math.PI * 2,
      });
    }
  }
  terr = terr.filter(p => p.x > camX - 300);
  rocks = rocks.filter(r => r.x > camX - 300 && r.y < camY + H() + 300);
}

function terrainYAt(x) {
  if (terr.length < 2) return groundProfile(x);
  for (let i = 0; i < terr.length - 1; i++) {
    const a = terr[i], b = terr[i + 1];
    if (x >= a.x && x <= b.x) {
      const t = (x - a.x) / (b.x - a.x);
      return lerp(a.y, b.y, t);
    }
  }
  return groundProfile(x);
}

function terrainNormalAt(x) {
  const e = 3;
  const y1 = terrainYAt(x - e);
  const y2 = terrainYAt(x + e);
  let tx = 2 * e;
  let ty = y2 - y1;
  const len = Math.hypot(tx, ty) || 1;
  tx /= len; ty /= len;
  return { nx: -ty, ny: tx, tangentX: tx, tangentY: ty, angle: Math.atan2(ty, tx) };
}

function screenToWorld(cx, cy) {
  return { x: cx + camX, y: cy + camY };
}

function pointerDown(cx, cy) {
  if (bike.crash) {
    resetGame();
    return;
  }
  hold = true;
  dragStart = screenToWorld(cx, cy);
  dragNow = { ...dragStart };
}
function pointerMove(cx, cy) {
  if (!hold) return;
  dragNow = screenToWorld(cx, cy);
}
function pointerUp() {
  if (!hold) return;
  let dx = dragNow.x - dragStart.x;
  let dy = dragNow.y - dragStart.y;
  const len = Math.hypot(dx, dy);
  const maxLen = 150;
  const used = Math.min(len, maxLen);
  const nx = len > 0 ? dx / len : 0;
  const ny = len > 0 ? dy / len : 0;

  const pullBack = clamp((-dx) / maxLen, 0, 1);
  const pullUp = clamp((-dy) / maxLen, 0, 1);
  const jump = (used / maxLen) * 5.5 + pullUp * 4.5 + pullBack * 1.5;

  bike.vx += 2 + pullBack * 2.5;
  bike.vy -= jump;
  bike.angVel += clamp((-dx) * 0.0025, -0.12, 0.12);

  hold = false;
  dragStart = null;
  dragNow = null;
}

canvas.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', pointerUp);
canvas.addEventListener('touchstart', e => { const t = e.touches[0]; pointerDown(t.clientX, t.clientY); }, { passive:false });
window.addEventListener('touchmove', e => { if (!hold) return; const t = e.touches[0]; pointerMove(t.clientX, t.clientY); }, { passive:false });
window.addEventListener('touchend', pointerUp);

function resetGame() {
  bike.x = 120;
  bike.y = 250;
  bike.vx = 0;
  bike.vy = 0;
  bike.angle = -0.15;
  bike.angVel = 0;
  bike.crash = false;
  bike.respawnTimer = 0;
  bike.forkComp = 0;
  bike.shockComp = 0;
  bike.forkVel = 0;
  bike.shockVel = 0;
  bike.forkVisual = 0;
  bike.shockVisual = 0;
  camX = 0;
  camY = 0;
  terr = [];
  rocks = [];
  genX = -400;
  ensureTerrain();
}
resetGame();

function update(dt) {
  ensureTerrain();

  if (bike.crash) {
    bike.respawnTimer -= dt;
    if (bike.respawnTimer <= 0) resetGame();
    return;
  }

  const worldHold = hold && dragStart && dragNow;
  let pullX = 0, pullY = 0, pullLen = 0;
  if (worldHold) {
    pullX = dragNow.x - dragStart.x;
    pullY = dragNow.y - dragStart.y;
    pullLen = Math.min(Math.hypot(pullX, pullY), 150);
  }
  slingshot.x = pullX;
  slingshot.y = pullY;
  slingshot.len = pullLen;

  const rearX0 = bike.x - Math.cos(bike.angle) * bike.wheelBase * 0.5;
  const rearY0 = bike.y - Math.sin(bike.angle) * bike.wheelBase * 0.5;
  const frontX0 = bike.x + Math.cos(bike.angle) * bike.wheelBase * 0.5;
  const frontY0 = bike.y + Math.sin(bike.angle) * bike.wheelBase * 0.5;

  const rearTy = terrainYAt(rearX0);
  const frontTy = terrainYAt(frontX0);
  const rearN = terrainNormalAt(rearX0);
  const frontN = terrainNormalAt(frontX0);

  const rearPen = rearY0 + bike.rearR - rearTy;
  const frontPen = frontY0 + bike.frontR - frontTy;
  const onRear = rearPen >= -1.5;
  const onFront = frontPen >= -1.5;
  bike.groundedRear = onRear;
  bike.groundedFront = onFront;
  bike.grounded = onRear || onFront;

  let drive = 0;
  let brake = 0;
  let leanInput = 0;

  if (hold) {
    drive = 0.22;
    leanInput = clamp(pullX / 95, -1, 1);
    if (pullX > 0) brake = clamp(pullX / 110, 0, 1);
  } else {
    brake = 0.42;
  }

  const gravity = 0.45;
  bike.vy += gravity;

  if (bike.grounded) {
    const avgAngle = onRear && onFront ? Math.atan2((frontTy - rearTy), (frontX0 - rearX0)) : (onRear ? rearN.angle : frontN.angle);
    const speedPitch = clamp(bike.vx * 0.007, -0.05, 0.10);
    const brakeDive = brake * 0.20;
    const manualLift = Math.max(0, -leanInput) * 0.16;
    const noseDown = Math.max(0, leanInput) * 0.12;
    const targetAngle = avgAngle + speedPitch + noseDown - manualLift - brakeDive;

    bike.angle = lerp(bike.angle, targetAngle, onRear && onFront ? 0.16 : 0.09);

    const slopeDrive = Math.sin(avgAngle) * 0.18;
    bike.vx += drive + slopeDrive;
    bike.vx *= (1 - 0.016 - brake * 0.055);

    const targetRearComp = clamp(Math.max(0, rearPen) * 1.8 + Math.abs(bike.vy) * 0.55 + Math.max(0, -leanInput) * 3.2, 0, 24);
    const targetFrontComp = clamp(Math.max(0, frontPen) * 1.9 + Math.abs(bike.vy) * 0.7 + brake * 16 + Math.max(0, leanInput) * 4.5, 0, 30);

    bike.shockVel += (targetRearComp - bike.shockComp) * 0.24;
    bike.forkVel += (targetFrontComp - bike.forkComp) * 0.28;
    bike.shockVel *= 0.70;
    bike.forkVel *= 0.66;
    bike.shockComp += bike.shockVel;
    bike.forkComp += bike.forkVel;

    if (onRear) {
      const desiredRearY = rearTy - bike.rearR;
      bike.y -= (rearY0 - desiredRearY) * 0.52;
      bike.vy *= 0.18;
    }
    if (onFront) {
      const desiredFrontY = frontTy - bike.frontR;
      bike.y -= (frontY0 - desiredFrontY) * 0.52;
      bike.vy *= 0.18;
    }
  } else {
    bike.vx *= 0.998;
    bike.angle += bike.angVel;
    bike.angVel += leanInput * 0.007;
    bike.angVel *= 0.992;

    bike.forkVel += (0 - bike.forkComp) * 0.16;
    bike.shockVel += (0 - bike.shockComp) * 0.14;
    bike.forkVel *= 0.87;
    bike.shockVel *= 0.88;
    bike.forkComp += bike.forkVel;
    bike.shockComp += bike.shockVel;
  }

  bike.forkComp = clamp(bike.forkComp, 0, 32);
  bike.shockComp = clamp(bike.shockComp, 0, 24);

  bike.x += bike.vx;
  bike.y += bike.vy;

  const headX = bike.x + Math.cos(bike.angle) * 25 - Math.sin(bike.angle) * 44;
  const headY = bike.y + Math.sin(bike.angle) * 25 + Math.cos(bike.angle) * 44;
  if (headY > terrainYAt(headX) - 6 && bike.vx > 2.5) {
    bike.crash = true;
    bike.respawnTimer = 1.2;
  }

  const rearX = bike.x - Math.cos(bike.angle) * bike.wheelBase * 0.5;
  const rearY = bike.y - Math.sin(bike.angle) * bike.wheelBase * 0.5;
  const frontX = bike.x + Math.cos(bike.angle) * bike.wheelBase * 0.5;
  const frontY = bike.y + Math.sin(bike.angle) * bike.wheelBase * 0.5;

  for (const rock of rocks) {
    rock.vy += gravity * 0.9;
    const gy = terrainYAt(rock.x);
    if (rock.y + rock.r >= gy) {
      rock.y = gy - rock.r;
      const n = terrainNormalAt(rock.x);
      rock.vy *= -0.1;
      rock.vx += n.tangentY * 0.12 + Math.sin(n.angle) * 0.25;
      rock.vx *= 0.993;
      rock.spin = rock.vx / Math.max(rock.r, 1);
    }
    rock.x += rock.vx;
    rock.y += rock.vy;
    rock.ang += rock.spin;

    const rr = bike.rearR + rock.r;
    const fr = bike.frontR + rock.r;
    const dRear = dist(rearX, rearY, rock.x, rock.y);
    const dFront = dist(frontX, frontY, rock.x, rock.y);
    if (dRear < rr) {
      const nx = (rock.x - rearX) / (dRear || 1);
      const ny = (rock.y - rearY) / (dRear || 1);
      const push = rr - dRear;
      rock.x += nx * push * 0.6;
      rock.y += ny * push * 0.6;
      rock.vx += nx * 0.35 + bike.vx * 0.05;
      rock.vy += ny * 0.2;
      bike.vx *= 0.985;
      bike.shockVel += push * 0.22;
    }
    if (dFront < fr) {
      const nx = (rock.x - frontX) / (dFront || 1);
      const ny = (rock.y - frontY) / (dFront || 1);
      const push = fr - dFront;
      rock.x += nx * push * 0.7;
      rock.y += ny * push * 0.7;
      rock.vx += nx * 0.5 + bike.vx * 0.08;
      rock.vy += ny * 0.25;
      bike.vx *= 0.976;
      bike.forkVel += push * 0.28;
      if (push > 10 && bike.vx > 6) bike.angVel += 0.03;
    }
  }

  bike.forkVisual = lerp(bike.forkVisual, bike.forkComp, 0.38);
  bike.shockVisual = lerp(bike.shockVisual, bike.shockComp, 0.35);

  camX = lerp(camX, bike.x - W() * 0.28, 0.07);
  camY = lerp(camY, bike.y - H() * 0.45, 0.07);

  speedEl.textContent = Math.max(0, Math.round(bike.vx * 6.5));
}

function drawBackground() {
  ctx.fillStyle = '#05070b';
  ctx.fillRect(0, 0, W(), H());

  let g = ctx.createRadialGradient(W()*0.5, H()*0.4, 0, W()*0.5, H()*0.4, W()*0.7);
  g.addColorStop(0, 'rgba(55,246,255,0.08)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W(),H());

  ctx.strokeStyle = 'rgba(55,246,255,0.03)';
  for (let i = -1; i < 5; i++) {
    ctx.beginPath();
    const cx = ((i * 270 - camX * 0.15) % (W()+280)) - 120;
    const cy = H()*0.45 + Math.sin(i + performance.now()*0.0002) * 20;
    ctx.arc(cx, cy, 140 + (i%3)*55, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawTerrain() {
  ctx.save();
  ctx.translate(-camX, -camY);

  ctx.beginPath();
  if (terr.length) {
    ctx.moveTo(terr[0].x, terr[0].y);
    for (let i = 1; i < terr.length; i++) ctx.lineTo(terr[i].x, terr[i].y);
    ctx.lineTo(terr[terr.length-1].x, camY + H() + 300);
    ctx.lineTo(terr[0].x, camY + H() + 300);
    ctx.closePath();
  }
  const grd = ctx.createLinearGradient(0, camY, 0, camY + H() + 260);
  grd.addColorStop(0, '#151b24');
  grd.addColorStop(1, '#0a0e14');
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.beginPath();
  if (terr.length) {
    ctx.moveTo(terr[0].x, terr[0].y);
    for (let i = 1; i < terr.length; i++) ctx.lineTo(terr[i].x, terr[i].y);
  }
  ctx.strokeStyle = '#35f4ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#35f4ff';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;

  for (const rock of rocks) {
    ctx.save();
    ctx.translate(rock.x, rock.y);
    ctx.rotate(rock.ang);
    ctx.beginPath();
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI * 2;
      const rr = rock.r * (0.82 + ((i % 2) ? 0.18 : -0.06));
      const px = Math.cos(a) * rr;
      const py = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = '#252e39';
    ctx.fill();
    ctx.strokeStyle = 'rgba(55,246,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function drawBike() {
  const forkSquish = bike.forkVisual;
  const shockSquish = bike.shockVisual;
  const wb = bike.wheelBase;
  const rear = { x: -wb*0.5, y: 0 };
  const front = { x: wb*0.5, y: 0 };

  const bb = { x: -4, y: -10 + shockSquish * 0.18 };
  const seat = { x: -26, y: -30 + shockSquish * 0.16 };
  const headTop = { x: 19, y: -44 + forkSquish * 0.10 };
  const headBot = { x: 23, y: -31 + forkSquish * 0.13 };
  const bar = { x: 31, y: -57 + forkSquish * 0.10 };
  const forkCrown = { x: 21, y: -34 + forkSquish * 0.12 };
  const axle = { x: front.x, y: front.y };
  const lowerFork = { x: front.x - 3, y: front.y - 4 };
  const shockTop = { x: -7, y: -31 };
  const shockBottom = { x: 1, y: -11 + shockSquish * 0.12 };

  ctx.save();
  ctx.translate(bike.x - camX, bike.y - camY);
  ctx.rotate(bike.angle);

  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 7;
  ctx.beginPath(); ctx.arc(rear.x, rear.y, bike.rearR, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(front.x, front.y, bike.frontR, 0, Math.PI*2); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#37f6ff';
  ctx.beginPath(); ctx.arc(rear.x, rear.y, bike.rearR-6, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(front.x, front.y, bike.frontR-6, 0, Math.PI*2); ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.82)';
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(rear.x, rear.y);
  ctx.lineTo(bb.x, bb.y);
  ctx.lineTo(headBot.x, headBot.y);
  ctx.lineTo(front.x, front.y);
  ctx.moveTo(headTop.x, headTop.y);
  ctx.lineTo(seat.x, seat.y);
  ctx.lineTo(rear.x, rear.y);
  ctx.moveTo(seat.x, seat.y);
  ctx.lineTo(bb.x, bb.y);
  ctx.stroke();

  ctx.strokeStyle = '#ff4b8b';
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.moveTo(shockTop.x, shockTop.y);
  ctx.lineTo(shockBottom.x, shockBottom.y);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(forkCrown.x, forkCrown.y);
  ctx.lineTo(lowerFork.x - 4, lowerFork.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(forkCrown.x + 5, forkCrown.y - 1);
  ctx.lineTo(lowerFork.x + 2, lowerFork.y - 1);
  ctx.stroke();

  ctx.strokeStyle = '#37f6ff';
  ctx.shadowColor = '#37f6ff';
  ctx.shadowBlur = 12;
  ctx.lineWidth = 2.1;
  ctx.beginPath();
  ctx.moveTo(headTop.x, headTop.y);
  ctx.lineTo(bar.x, bar.y);
  ctx.lineTo(bar.x + 8, bar.y - 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(forkCrown.x, forkCrown.y);
  ctx.lineTo(lowerFork.x, lowerFork.y);
  ctx.lineTo(axle.x, axle.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(forkCrown.x + 5, forkCrown.y - 1);
  ctx.lineTo(lowerFork.x + 6, lowerFork.y - 1);
  ctx.lineTo(axle.x + 3, axle.y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = '#37f6ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const t = i / 4;
    const x = lerp(shockTop.x, shockBottom.x, t) + (i % 2 ? 3 : -3);
    const y = lerp(shockTop.y, shockBottom.y, t);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const hands = { x: bar.x + 8, y: bar.y - 1 };
  const pedals = { x: bb.x + 7, y: bb.y + 9 };
  let hips = { x: seat.x + 8, y: seat.y - 10 };
  let shoulders = { x: 8, y: -52 };
  let helmet = { x: 15, y: -62 };

  const dx = hold && dragNow && dragStart ? clamp((dragNow.x - dragStart.x)/90, -1, 1) : 0;
  const airborne = !bike.grounded;

  hips.x -= dx * 12;
  hips.y += Math.max(0, dx) * 5 - Math.max(0, -dx) * 2;
  shoulders.x += dx * 6;
  shoulders.y += Math.max(0, dx) * 6;
  helmet.x += dx * 7;
  helmet.y += Math.max(0, dx) * 6;

  if (airborne) {
    hips.y += 6;
    shoulders.y += 4;
    helmet.y += 4;
  }

  ctx.strokeStyle = bike.crash ? '#ff4b8b' : '#37f6ff';
  ctx.shadowColor = ctx.strokeStyle;
  ctx.shadowBlur = 10;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(hips.x, hips.y);
  ctx.lineTo(shoulders.x, shoulders.y);

  const armMid = { x: (shoulders.x + hands.x)/2 - 2, y: (shoulders.y + hands.y)/2 + 4 };
  ctx.moveTo(shoulders.x, shoulders.y);
  ctx.lineTo(armMid.x, armMid.y);
  ctx.lineTo(hands.x, hands.y);

  const legMid = { x: (hips.x + pedals.x)/2 + 6, y: (hips.y + pedals.y)/2 + 7 };
  ctx.moveTo(hips.x, hips.y);
  ctx.lineTo(legMid.x, legMid.y);
  ctx.lineTo(pedals.x, pedals.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(helmet.x, helmet.y, 8, 0, Math.PI*2);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.fill();
  ctx.shadowBlur = 0;

  if (hold && dragStart && dragNow) {
    const sx = dragStart.x - camX;
    const sy = dragStart.y - camY;
    const ex = dragNow.x - camX;
    const ey = dragNow.y - camY;
    ctx.setLineDash([8, 6]);
    ctx.strokeStyle = 'rgba(55,246,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawCrash() {
  if (!bike.crash) return;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,W(),H());
  ctx.fillStyle = '#ff4b8b';
  ctx.font = '900 46px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('SLAM', W()/2, H()/2 - 10);
  ctx.fillStyle = 'white';
  ctx.font = '18px system-ui';
  ctx.fillText('Újratöltés...', W()/2, H()/2 + 26);
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(1.4, (now - last) / 16.6667);
  last = now;
  update(dt);
  drawBackground();
  drawTerrain();
  drawBike();
  drawCrash();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
